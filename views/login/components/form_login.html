<!-- /views/login/components/form_login.html -->
<form id="form-login" class="space-y-5">
    <div>
        <label for="login-username" class="block text-sm font-medium text-gray-400 mb-1">Username</label>
        <div class="relative">
            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                <i class="fa-solid fa-user text-gray-500"></i>
            </div>
            <input type="text" id="login-username" name="username" required autocomplete="off"
                class="block w-full pl-10 pr-3 py-2 border border-gray-600 rounded-lg bg-gray-900 text-gray-200 placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-colors sm:text-sm">
        </div>
    </div>

    <div>
        <label for="login-password" class="block text-sm font-medium text-gray-400 mb-1">Palavra-passe</label>
        <div class="relative">
            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                <i class="fa-solid fa-lock text-gray-500"></i>
            </div>
            <input type="password" id="login-password" name="password" required autocomplete="off"
                class="block w-full pl-10 pr-3 py-2 border border-gray-600 rounded-lg bg-gray-900 text-gray-200 placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-colors sm:text-sm">
        </div>
    </div>

    <button type="submit" id="btn-submit-login" class="w-full flex justify-center py-2.5 px-4 border border-transparent rounded-lg shadow-sm text-sm font-medium text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 focus:ring-offset-gray-900 transition-colors">
        <span>Entrar</span>
        <i class="fa-solid fa-circle-notch fa-spin hidden ml-2 mt-0.5" id="spinner-login"></i>
    </button>

    <div class="text-center mt-4 text-sm text-gray-400">
        Não tens conta? <a href="#" id="toggle-to-register" class="font-medium text-blue-400 hover:text-blue-300 transition-colors">Criar agora</a>
    </div>
</form>
